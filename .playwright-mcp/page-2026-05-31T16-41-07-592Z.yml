                    - heading "Contexto do Projeto e Objetivo" [level=1] [ref=e93]
                    - paragraph [ref=e94]:
                      - text: Você é um Engenheiro de Software Sênior especialista em .NET. Estamos trabalhando em uma melhoria para um sistema SaaS de licitações públicas para prefeituras desenvolvido em
