                      - code [ref=e98]: "/ItensCotacao/Cmed/{id}?selectItem={itemId}"
                      - text: ). Atualmente, o usuário escolhe esse percentual manualmente em um elemento
                      - code [ref=e99]: <select>
                      - text: . A automação deve definir o valor padrão com base no estado (UF) da prefeitura que está operando o sistema, permitindo ainda a alteração manual caso necessário.
