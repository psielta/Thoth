services:
  postgres:
    image: postgres:18-alpine
    container_name: prompttasks-postgres
    environment:
      POSTGRES_DB: prompttasks
      POSTGRES_USER: prompttasks
      POSTGRES_PASSWORD: prompttasks
    ports:
      - "5459:5432"
    volumes:
      - prompttasks-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prompttasks -d prompttasks"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  prompttasks-postgres-data:
